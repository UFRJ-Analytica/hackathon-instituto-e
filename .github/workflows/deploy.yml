name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 177.7.55.100
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/hacka-emais
            git pull origin main
            docker compose up -d --build
            docker image prune -f
